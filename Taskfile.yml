version: "3"

vars:
  GOOS: linux
  GOARCH: arm64
  CGO_ENABLED: "0"
  BUILD_FLAGS: -tags lambda.norpc -trimpath -ldflags="-s -w"
  BIN_DIR: bin

tasks:
  build:
    desc: Build all cmd/ entry points as arm64 Linux binaries
    cmds:
      - |
        for dir in cmd/*/; do
          func=$(basename "$dir")
          echo "Building $func..."
          GOOS={{.GOOS}} GOARCH={{.GOARCH}} CGO_ENABLED={{.CGO_ENABLED}} \
            go build {{.BUILD_FLAGS}} -o {{.BIN_DIR}}/$func/bootstrap ./cmd/$func/
        done
    sources:
      - cmd/**/*.go
      - internal/**/*.go
      - go.mod
      - go.sum

  build-func:
    desc: "Build a single function (usage: task build-func FUNC=myhandler)"
    requires:
      vars: [FUNC]
    cmds:
      - |
        GOOS={{.GOOS}} GOARCH={{.GOARCH}} CGO_ENABLED={{.CGO_ENABLED}} \
          go build {{.BUILD_FLAGS}} -o {{.BIN_DIR}}/{{.FUNC}}/bootstrap ./cmd/{{.FUNC}}/

  test-unit:
    desc: Run unit tests
    cmds:
      - go test -short -count=1 -race ./...

  test-integration:
    desc: Run integration tests (requires local services)
    cmds:
      - go test -run Integration -count=1 -race ./...

  test-all:
    desc: Run all tests
    cmds:
      - go test -count=1 -race ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  audit:
    desc: Run security audit with govulncheck
    cmds:
      - govulncheck ./...

  package:
    desc: Package built binaries into zip files for Lambda deployment
    deps: [build]
    cmds:
      - |
        for dir in {{.BIN_DIR}}/*/; do
          func=$(basename "$dir")
          echo "Packaging $func..."
          (cd "$dir" && zip "../$func.zip" bootstrap)
        done

  deploy-dev:
    desc: Deploy to dev environment
    deps: [package]
    cmds:
      - echo "Deploying to dev..."
      - bash scripts/deploy.sh dev

  deploy-staging:
    desc: Deploy to staging environment
    deps: [package]
    cmds:
      - echo "Deploying to staging..."
      - bash scripts/deploy.sh staging

  deploy-prod:
    desc: Deploy to production environment
    deps: [package]
    cmds:
      - echo "Deploying to prod..."
      - bash scripts/deploy.sh prod

  local-up:
    desc: Start local development services (LocalStack, Redis)
    cmds:
      - docker-compose up -d

  local-down:
    desc: Stop local development services
    cmds:
      - docker-compose down

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.BIN_DIR}}
      - go clean -cache -testcache

  mod-tidy:
    desc: Tidy and verify Go modules
    cmds:
      - go mod tidy
      - go mod verify
